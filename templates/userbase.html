<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NexWear</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='bootstrap.min.css') }}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background-color:#f8f9fa;
        }

        .main-content{
            min-height:80vh;
        }

    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="{{ url_for('userhome') }}">

            NexWear

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <!-- Left Menu -->
            <ul class="navbar-nav me-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="{{ url_for('userhome') }}" style="color: snow">

                        Home

                    </a>

                </li>


                <li class="nav-item">

                    <a class="nav-link"
                       href="{{ url_for('myaccount') }}"style="color: snow">

                        My Profile

                    </a>

                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('cart') }}" style="color: snow">
                        Cart
                    </a>
                </li>

            </ul>

            <!-- Logout -->
            <a href="{{ url_for('logout') }}"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<!-- Main Content -->

<div class="container py-4 main-content">

    {% block body %}
    {% endblock %}

</div>

<!-- Footer -->

<footer class="bg-dark text-white mt-5">

    <div class="container py-4">

        <div class="row">

            <div class="col-md-6">

                <h5 class="fw-bold">
                    NexWear
                </h5>

                <p class="mb-0">
                    Discover premium quality fashion collections with modern styles and comfort.
                </p>

            </div>

            <div class="col-md-6 text-md-end">

                <p class="mb-0">
                    © 2026 NexWear. All Rights Reserved.
                </p>

            </div>

        </div>

    </div>

</footer>

<!-- Bootstrap JS -->

<script src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>

</body>

</html>
