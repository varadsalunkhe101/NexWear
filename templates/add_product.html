{% extends "adminbase.html" %}

{% block body %}

<div class="container py-4">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">
                Add Product
            </h4>

        </div>

        <div class="card-body">

            <form action="{{ url_for('add_product') }}"
                  method="POST"
                  enctype="multipart/form-data">

                <div class="row">

                    <!-- Product Name -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Product Name
                        </label>

                        <input type="text"
                               name="product_name"
                               class="form-control"
                               required>

                    </div>

                    <!-- Price -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Price
                        </label>

                        <input type="number"
                               name="price"
                               class="form-control"
                               required>

                    </div>

                    <!-- Size -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Size
                        </label>

                        <input type="text"
                               name="size"
                               class="form-control"
                               placeholder="S, M, L, XL"
                               required>

                    </div>

                    <!-- Brand -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Brand
                        </label>

                        <input type="text"
                               name="brand"
                               class="form-control"
                               required>

                    </div>

                    <!-- Category -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Category
                        </label>

                        <input type="text"
                               name="category"
                               class="form-control"
                               required>

                    </div>

                    <!-- Color -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Color
                        </label>

                        <input type="text"
                               name="color"
                               class="form-control"
                               required>

                    </div>

                    <!-- Discount -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Discount (%)
                        </label>

                        <input type="number"
                               name="discount"
                               class="form-control"
                               required>

                    </div>

                    <!-- Product Image -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Product Image
                        </label>

                        <input type="file"
                               name="product_image"
                               class="form-control"
                               accept=".jpg,.jpeg,.png,.webp"
                               required>

                    </div>

                </div>

                <div class="mt-3 d-flex gap-2">

                    <button type="submit"
                            class="btn btn-success">

                        Add Product

                    </button>

                    <button type="reset"
                            class="btn btn-danger">

                        Cancel

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
