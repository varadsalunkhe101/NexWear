{% extends "adminbase.html" %}

{% block body %}

<div class="card shadow-sm border-0">

    <div class="card-header bg-primary text-white">

        <h4 class="mb-0">
            Manage Categories
        </h4>

    </div>

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-primary">

                    <tr>

                        <th>ID</th>
                        <th>Category Name</th>
                        <th>Category Image</th>
                        <th>Description</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                {% for row in value %}

                <tr>

                    <form action="{{ url_for('update_category') }}"
                          method="POST"
                          enctype="multipart/form-data">

                        <td>

                            {{ row[0] }}

                            <input type="hidden"
                                   name="cid"
                                   value="{{ row[0] }}">

                        </td>

                        <td>

                            <input type="text"
                                   name="category_name"
                                   value="{{ row[1] }}"
                                   class="form-control">

                        </td>

                        <td>

                            <img src="/{{ row[2] }}"
                                 class="img-thumbnail mb-2"
                                 width="100"
                                 alt="Category Image">

                            <input type="file"
                                   name="category_image"
                                   class="form-control">

                        </td>

                        <td>

                            <textarea name="category_description"
                                      class="form-control"
                                      rows="3">{{ row[3] }}</textarea>

                        </td>

                        <td>

                            <div class="d-flex gap-2">

                                <button type="submit"
                                        class="btn btn-success btn-sm">

                                    Update

                                </button>

                    </form>

                    <form action="{{ url_for('delete_category') }}"
                          method="POST">

                        <input type="hidden"
                               name="cid"
                               value="{{ row[0] }}">

                        <button type="submit"
                                class="btn btn-danger btn-sm">

                            Delete

                        </button>

                    </form>

                            </div>

                        </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
